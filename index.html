<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Back Rising - 3D RPG Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        #gameContainer {
            width: 350px;
            height: 550px;
            position: relative;
            background: #000;
            border: 3px solid #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlays */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-top {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border: 1px solid #FFD700;
            border-radius: 4px;
        }

        .hud-bottom {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            text-align: center;
            font-size: 12px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* Screens */
        #mainMenu, #upgradeScreen, #gameOverScreen, #pauseScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            text-align: center;
        }

        #mainMenu.active, #upgradeScreen.active, #gameOverScreen.active, #pauseScreen.active {
            display: flex;
        }

        .menu-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
        }

        .menu-content {
            max-height: 70%;
            overflow-y: auto;
            margin-bottom: 20px;
            width: 90%;
        }

        .stat-upgrade {
            background: rgba(50, 50, 50, 0.8);
            border: 1px solid #666;
            padding: 10px;
            margin: 8px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-upgrade.selected {
            background: rgba(255, 215, 0, 0.2);
            border-color: #FFD700;
        }

        button {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
            pointer-events: auto;
        }

        button:hover {
            background: #FFF;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .info-text {
            font-size: 12px;
            color: #ccc;
            margin: 10px 0;
            line-height: 1.4;
        }

        #chapterInfo {
            font-size: 16px;
            color: #FFD700;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .stat-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            margin: 10px 0;
        }

        .stat-item {
            background: rgba(30, 30, 30, 0.8);
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .stat-item strong {
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="hud-top">
                <div class="stat-box">Score: <span id="scoreDisplay">0</span></div>
                <div class="stat-box">⭐ <span id="starDisplay">0</span></div>
                <div class="stat-box">HP: <span id="hpDisplay">100</span></div>
            </div>
            <div class="hud-bottom">
                <div id="meterInfo">Distance: <span id="distanceDisplay">0</span>m</div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="mainMenu" class="active">
            <div class="menu-title">Running Back Rising</div>
            <div style="font-size: 14px; color: #FFD700; margin-bottom: 30px;">3D RPG Runner</div>
            <div id="chapterInfo"></div>
            <div class="stat-display" id="playerStats"></div>
            <div class="info-text">Touch left/right to switch lanes<br>Dodge obstacles, collect stars</div>
            <div class="button-group">
                <button onclick="game.startGame()">START GAME</button>
            </div>
        </div>

        <!-- Upgrade Screen (shown between chapters) -->
        <div id="upgradeScreen">
            <div class="menu-title">Upgrade Stats</div>
            <div class="info-text" id="upgradeInfo"></div>
            <div class="menu-content" id="upgradeOptions"></div>
            <div class="button-group">
                <button onclick="game.startGame()">Next Chapter</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen">
            <div class="menu-title">Chapter Failed</div>
            <div class="info-text" id="gameOverStats"></div>
            <div class="button-group">
                <button onclick="game.showMainMenu()">Main Menu</button>
                <button onclick="game.startGame()">Retry Chapter</button>
            </div>
        </div>

        <!-- Pause Screen -->
        <div id="pauseScreen">
            <div class="menu-title">PAUSED</div>
            <div class="info-text">Resume your run</div>
            <div class="button-group">
                <button onclick="game.togglePause()">Resume</button>
                <button onclick="game.showMainMenu()">Main Menu</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
